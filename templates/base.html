{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twos - {% block title %}Cosmic Command Centre{% endblock %}</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/gh/iamashruu/cursorly.js@latest/dist/cursorly.min.js"></script>


    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'styles/output.css' %}" />
    <link rel="stylesheet" href="{% static 'styles/input.css' %}" />
  </head>
  <body class="text-slate-100 font-sans antialiased min-h-screen flex flex-col">
    <!-- Loader Overlay -->
    <div
      id="loader"
      class="fixed inset-0 z-[9999] flex items-center justify-center"
    >
      <div class="relative flex items-center justify-center">
        <!-- Outer Glowing Ring -->
        <div
          class="w-16 h-16 rounded-full border-4 border-t-indigo-500 border-r-transparent border-b-purple-500 border-l-transparent animate-spin"
        ></div>
        <!-- Inner Static Icon -->
        <div class="absolute text-indigo-400 text-xl">
          <i class="fa-solid fa-frog fa-bounce"></i>
        </div>
      </div>
    </div>

    <!-- Cosmic Navbar -->
    <nav class="cosmic-panel border-b sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center"
      >
        <!-- Logo -->
        <div class="flex items-center gap-2">
          <div
            class="w-8 h-8 flex items-center justify-center text-indigo-400 bg-indigo-500/10 rounded-full border border-indigo-500/20"
          >
            <i class="fa-solid fa-user-astronaut text-sm"></i>
          </div>
          <a
            class="text-xl font-bold bg-gradient-to-r from-indigo-300 to-purple-300 bg-clip-text text-transparent"
            href="{% url 'index' %}"
            >Twos</a
          >
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center gap-8">
          <div class="flex items-center gap-5 border-l border-slate-800 pl-8">
            <a
              title="Dashboard"
              href="{% url 'index' %}"
              class="text-slate-400 hover:text-indigo-400 transition flex items-center gap-2"
            >
              <i class="fa-solid fa-layer-group"></i>
            </a>
            <button
              title="Calendar"
              class="text-slate-400 hover:text-indigo-400 relative"
            >
              <i class="fa-solid fa-calendar-days"></i>
            </button>
            <button
              title="Notifications"
              class="text-slate-400 hover:text-indigo-400 relative"
            >
              <i class="fa-solid fa-bell"></i>
              <span
                class="absolute -top-2 -right-2 w-4 h-4 bg-red-500 text-[10px] rounded-full flex items-center justify-center text-white"
                >3</span
              >
            </button>
            <a
              title="about"
              href="{% url 'about' %}"
              class="text-slate-400 hover:text-indigo-400"
              ><i class="fa-solid fa-circle-info"></i
            ></a>
            <a title="profile" href="{% url 'profile' %}"
              ><img
                src="https://ui-avatars.com/api/?name=Atonu&background=6366f1&color=fff"
                class="w-8 h-8 rounded-full border border-slate-700"
            /></a>
          </div>
        </div>

        <!-- Mobile Menu Button -->
        <div class="md:hidden flex items-center gap-4">
          <button class="text-slate-400 relative p-2">
            <i class="fa-solid fa-bell"></i>
          </button>
          <button id="menuBtn" class="text-slate-200 p-2">
            <i class="fa-solid fa-bars-staggered text-xl"></i>
          </button>
        </div>
      </div>

      <!-- Mobile Drawer (Hidden by default) -->
      <div
        id="mobileMenu"
        class="hidden md:hidden bg-slate-950 border-b border-slate-800 p-5 space-y-4"
      >
        <a
          href="{% url 'index' %}"
          class="block text-slate-300 hover:text-indigo-400 py-2"
          ><i class="fa-solid fa-layer-group mr-3"></i> Dashboard</a
        >
        <a href="#" class="block text-slate-300 hover:text-indigo-400 py-2"
          ><i class="fa-solid fa-calendar-days mr-3"></i> Calendar</a
        >
        <a
          href="{% url 'about' %}"
          class="block text-slate-300 hover:text-indigo-400 py-2"
          ><i class="fa-solid fa-circle-info mr-3"></i> About</a
        >
        <a
          href="{% url 'profile' %}"
          class="block text-slate-300 hover:text-indigo-400 py-2"
          ><i class="fa-solid fa-circle-user mr-3"></i> Profile</a
        >
      </div>
    </nav>

    <!-- Main Content -->
    <main class="w-full max-w-7xl mx-auto px-4 sm:px-6 py-6">
      {% block content %}{% endblock %}
    </main>

    <script src="{% static 'js/app.js' %}"></script>
  </body>
</html>
