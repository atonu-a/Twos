{% extends 'base.html' %}

{% block title %}Access Command | Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="cosmic-panel rounded-3xl p-8 shadow-2xl border border-purple-500/20">
        <div class="text-center mb-8">
            <div
                class="w-16 h-16 bg-purple-500/10 text-purple-400 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-purple-500/20">
                <i class="fa-solid fa-key text-2xl"></i>
            </div>
            <h2 class="text-3xl font-bold text-slate-100">Welcome Back</h2>
            <p class="text-slate-400 mt-2">Enter your credentials to board</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div class="group">
                <input type="text" name="username" required
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-purple-500 transition"
                    placeholder="Username">
            </div>
            <div class="group">
                <input type="password" name="password" required
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-purple-500 transition"
                    placeholder="Password">
            </div>

            <div class="flex items-center justify-between text-xs">
                <label class="flex items-center text-slate-400 cursor-pointer">
                    <input type="checkbox" class="mr-2 accent-purple-500"> Remember Device
                </label>
                <a href="#" class="text-purple-400 hover:underline">Lost in space?</a>
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:scale-[1.02] active:scale-95 text-white py-3 rounded-xl font-bold transition-all shadow-lg shadow-purple-500/25">
                Launch Dashboard
            </button>
        </form>

        <p class="text-center text-slate-400 mt-8 text-sm border-t border-slate-800 pt-6">
            New to the station? <a href="{% url 'register' %}" class="text-purple-400 font-medium hover:underline">Join
                the Fleet</a>
        </p>
    </div>
</div>
{% endblock %}
